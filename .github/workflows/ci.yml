name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_STACK_PROJECT_ID: 00000000-0000-4000-8000-000000000000
      NEXT_PUBLIC_STACK_PUBLISHABLE_CLIENT_KEY: stack_publishable_client_key
      STACK_SECRET_SERVER_KEY: stack_secret_server_key
      DODO_PAYMENTS_API_KEY: dodo_api_key
      DODO_PAYMENTS_WEBHOOK_KEY: dodo_webhook_key
      DODO_PAYMENTS_RETURN_URL: http://localhost:3000/dashboard/billing
      DODO_PAYMENTS_ENVIRONMENT: test_mode
      DODO_PRODUCT_ID_PRO_MONTHLY: pdt_pro_monthly
      DODO_PRODUCT_ID_PRO_YEARLY: pdt_pro_yearly
      DODO_PRODUCT_ID_LIFETIME: pdt_lifetime
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check formatting
        run: bun run format:check

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Unit tests
        run: bun run test

      - name: Build
        run: bun run build

      - name: Install Playwright
        run: bunx playwright install --with-deps chromium

      - name: E2E tests
        run: bun run test:e2e
